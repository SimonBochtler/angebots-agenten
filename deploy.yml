const express = require("express");
const path = require("path");

const app = express();
const PORT = process.env.PORT || 8080;
const ANTHROPIC_API_KEY = process.env.ANTHROPIC_API_KEY || "";

app.use(express.json());
app.use(express.static(path.join(__dirname, "static")));

// Health Check für Azure
app.get("/health", (req, res) => {
  res.json({ status: "ok" });
});

// Proxy zur Anthropic API
app.post("/api/chat", async (req, res) => {
  if (!ANTHROPIC_API_KEY) {
    return res.status(500).json({
      error: "Kein API-Key konfiguriert. Bitte ANTHROPIC_API_KEY in Azure App Service Configuration eintragen.",
    });
  }

  const { model, max_tokens, system, messages } = req.body;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": ANTHROPIC_API_KEY,
        "anthropic-version": "2023-06-01",
      },
      body: JSON.stringify({ model, max_tokens, system, messages }),
    });

    const data = await response.json();

    if (!response.ok) {
      return res.status(response.status).json({ error: data });
    }

    res.json(data);
  } catch (err) {
    res.status(502).json({ error: err.message });
  }
});

// Alle anderen Routen → index.html (Single Page App)
app.get("*", (req, res) => {
  res.sendFile(path.join(__dirname, "static", "index.html"));
});

app.listen(PORT, () => {
  console.log(`\n  Angebots-Agenten Server`);
  console.log(`  ─────────────────────────`);
  console.log(`  Läuft auf Port: ${PORT}`);
  console.log(`  Umgebung: ${process.env.NODE_ENV || "development"}\n`);
});
